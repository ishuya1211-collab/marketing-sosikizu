<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタートアップクラス-マーケティングチーム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>スタートアップクラス-マーケティングチーム</h1>
            <p class="subtitle">1人で統括する最強のAIエージェント組織</p>
        </header>
        
        <main id="org-chart-container">
            <!-- Org Chart will be rendered here -->
        </main>

        <section id="role-details" class="details-panel hidden">
            <div class="details-content glass">
                <button id="close-details" class="close-btn">&times;</button>
                <div id="details-body"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
